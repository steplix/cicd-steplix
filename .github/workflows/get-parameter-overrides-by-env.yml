name: >
  Get parameter overrides by environment

on:
  workflow_call:
    inputs:
      ENVIRONMENT:
        required: true
        type: string
      SAMCONFIG_PATH:
        required: false
        type: string
        default: samconfig.toml
    outputs:
      PARAMETER_OVERRIDES:
        description: 'parameter_overrides read from samconfig.toml for the selected environment'
        value: ${{ jobs.get-parameter-overrides-by-env.outputs.PARAMETER_OVERRIDES }}

jobs:
  get-parameter-overrides-by-env:
    runs-on: ubuntu-22.04
    outputs:
      PARAMETER_OVERRIDES: ${{ steps.set-parameter-overrides.outputs.PARAMETER_OVERRIDES }}
    steps:
      - uses: actions/checkout@v5

      - name: Read parameter_overrides from samconfig.toml
        id: set-parameter-overrides
        run: |
          python3 <<'PY'
          import os
          import pathlib
          import re

          environment = "${{ inputs.ENVIRONMENT }}"
          samconfig_path = pathlib.Path("${{ inputs.SAMCONFIG_PATH }}")
          github_output = pathlib.Path(os.environ["GITHUB_OUTPUT"])

          parameter_overrides = ""

          if samconfig_path.exists():
              lines = samconfig_path.read_text(encoding="utf-8").splitlines()
              target_section = f"[{environment}.deploy.parameters]"
              in_target_section = False
              in_parameter_overrides = False
              values = []

              for line in lines:
                  stripped = line.strip()

                  if not stripped or stripped.startswith("#"):
                      continue

                  if stripped.startswith("[") and stripped.endswith("]"):
                      in_target_section = stripped == target_section
                      in_parameter_overrides = False
                      continue

                  if not in_target_section:
                      continue

                  if not in_parameter_overrides:
                      if not stripped.startswith("parameter_overrides"):
                          continue

                      _, _, remainder = stripped.partition("=")
                      remainder = remainder.strip()

                      if remainder.startswith("["):
                          in_parameter_overrides = True
                          remainder = remainder[1:].strip()
                      elif remainder.startswith('"') and remainder.endswith('"'):
                          values.extend(re.findall(r'"([^"]*)"', remainder))
                          break
                      else:
                          continue
                  else:
                      remainder = stripped

                  if "]" in remainder:
                      remainder, _, _ = remainder.partition("]")
                      in_parameter_overrides = False

                  values.extend(re.findall(r'"([^"]*)"', remainder))

                  if not in_parameter_overrides:
                      break

              parameter_overrides = " ".join(value.strip() for value in values if value.strip())

          with github_output.open("a", encoding="utf-8") as fh:
              fh.write(f"PARAMETER_OVERRIDES={parameter_overrides}\n")
          PY

      - name: Log parameter overrides
        run: |
          echo "Parameter overrides: '${{ steps.set-parameter-overrides.outputs.PARAMETER_OVERRIDES }}'"
